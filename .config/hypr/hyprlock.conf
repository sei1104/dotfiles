source = /home/$USER/.cache/wal/colors-hyprland

# Horizontal display (PIN entry)
background {
    monitor = eDP-1
    path = $wallpaper
    blur_size = 5
    blur_passes = 3
    brightness = .6
}

input-field {
    monitor = eDP-1
    size = 6%, 4%
    outline_thickness = 2
    dots_rounding = 4
    dots_spacing = .5
    dots_fase_time = 300
    inner_color = $backgroundCol
    outer_color = $backgroundCol $backgroundCol
    check_color = $backgroundCol $backgroundCol
    fail_color = $backgroundCol $backgroundCol
    font_color = $color9
    font_family = CodeNewRoman Nerd Font Propo
    fade_on_empty = false
    shadow_color = rgba(0,0,0,0.5)
    shadow_passes = 2
    shadow_size = 2
    rounding = 20
    placeholder_text = <i></i>
    fail_text = <b>FAIL</b>
    fail_timeout = 300
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = <i>Hello</i> <b>$USER</b>
    color = $color5
    font_size = 40
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 0
    shadow_size = 4
    position = 0, 100
    halign = center
    valign = center
}

# Vertical display (info)
background {
    monitor = eDP-1
    path = $wallpaper
    blur_size = 5
    blur_passes = 3
    brightness = .6
}

label {
    monitor = eDP-1
    text = cmd[update:1000] date +"<b>%H</b>:<b>%M</b>"
    color = $color9
    font_size = 120
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 0
    shadow_size = 5
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = cmd[update:1000] date +"<b>%A, %B %d, %Y</b>"
    color = $color4
    font_size = 40
    font_family = CodeNewRoman Nerd Font Propo
    shadow_passes = 0
    shadow_size = 4
    position = 0, 350
    halign = center
    valign = center
}

